name: "Lint"

on:
  push:
    paths-ignore:
      - "**/README.md"
      - "**/info.md"
      - "**/CHANGELOG.md"
      - "**/CONTRIBUTING.md"
      - "**/requirements.txt"
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install ruff
        run: python3 -m pip install ruff==0.15.19

      - name: Lint
        run: python3 -m ruff check .

      - name: Format
        run: python3 -m ruff format . --check
